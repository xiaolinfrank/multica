# BayClaw bioinformatics sandbox — R / Bioconductor stack.
# Covers the classic bulk RNA-seq downstream + clinical-stats workload:
# differential expression, functional enrichment, survival, publication plots.
# Heavy upstream aligners (STAR/HISAT2) and reference genomes are intentionally
# excluded — they belong in a separate, on-demand image (see ROADMAP.md).
name: base
channels:
  - conda-forge
  - bioconda
dependencies:
  - r-base>=4.3
  - r-tidyverse
  - r-data.table
  - r-pheatmap
  - r-survival
  - r-survminer
  - r-optparse
  - bioconductor-deseq2
  - bioconductor-edger
  - bioconductor-limma
  - bioconductor-clusterprofiler
  - bioconductor-org.hs.eg.db
  - bioconductor-enhancedvolcano
  - bioconductor-tximport
